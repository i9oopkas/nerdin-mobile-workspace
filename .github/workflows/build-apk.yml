name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Widget tests
        run: flutter test test/activity_bar_test.dart test/smoke_test.dart
        continue-on-error: false
        timeout-minutes: 5

      - name: Static analysis
        id: analyze
        continue-on-error: true
        run: |
          flutter analyze 2>&1 | tee analyze_output.txt
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT

      - name: Build debug APK
        id: build
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT

      - name: Check logs for errors
        if: always()
        run: |
          echo "## 🔍 Build log summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f analyze_output.txt ]; then
            echo "### flutter analyze" >> $GITHUB_STEP_SUMMARY
            ERRORS=$(grep -cE "error|Error" analyze_output.txt || true)
            WARNINGS=$(grep -cE "warning|Warning" analyze_output.txt || true)
            echo "- Errors: $ERRORS, Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -n "error" analyze_output.txt | head -20 >> $GITHUB_STEP_SUMMARY
            echo '...' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f build_output.txt ]; then
            echo "### flutter build" >> $GITHUB_STEP_SUMMARY
            if grep -q "BUILD FAILED" build_output.txt; then
              echo "- ❌ **Build FAILED**" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -E "Error:|error:|FAILED|Exception|exit code" build_output.txt | head -30 >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ Build SUCCESS" >> $GITHUB_STEP_SUMMARY
              grep "Built" build_output.txt >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**APK uploaded as artifact:** \`nerdin-alpha-test-0.1\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nerdin-alpha-test-0.1
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
