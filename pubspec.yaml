name: nerdin_mobile_workspace
description: Open-source mobile AI development environment for Android
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.1.0
  
  # Navigation
  go_router: ^17.0.0
  
  # Network & API
  dio: ^5.9.0
  http_parser: ^4.0.2
  
  
  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.2
  synchronized: ^3.4.1
  hive_ce: ^2.14.0
  hive_ce_flutter: ^2.3.2
  
  # UI Components - Markdown Rendering
  markdown: ^7.3.0
  pdfrx: ^2.4.3
  socket_io_client: ^3.1.2
  yaml: ^3.1.2
  flutter_tex: ^5.2.6
  
  
  
  # Modern Animations
  flutter_animate: ^4.5.0
  
  # Platform Features
  permission_handler: ^12.0.1
  path_provider: ^2.1.4
  record: ^6.2.0
  audio_session: ^0.2.2
  vad: ^0.0.8
  image_picker: ^1.2.0
  file_picker: ^12.0.0-beta.5
  flutter_image_compress: ^2.1.0
  
  # Utilities
  path: ^1.9.0
  uuid: ^4.5.0
  crypto: ^3.0.3
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.0
  intl: ^0.20.2

  # Icons & Theming
  cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  wakelock_plus: ^1.4.0
  share_plus: ^13.1.0
  riverpod_annotation: ^4.0.0
  flutter_local_notifications: ^22.0.0
  connectivity_plus: ^7.0.0
  flutter_cache_manager: ^3.4.1
  http: ^1.5.0
  html_unescape: ^2.0.0
  flutter_highlight: ^0.7.0
  web_socket_channel: ^3.0.3
  jovial_svg: ^1.1.29
  highlight: ^0.7.0
  # Pinned to a fork commit; reason undocumented - verify before changing.
  super_sliver_list:
    git:
      url: https://github.com/Telosnex/super_sliver_list.git
      ref: 7a897c8ef022966758ac1f7a8d96c0a14b260c9c
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  
  # Native Features
  cached_network_image_ce: ^4.6.4
  adaptive_platform_ui: ^0.1.103
  flutter_callkit_incoming: ^3.1.1
  flutter_sharing_intent: ^2.0.4
  geolocator: ^14.0.2
  home_widget: ^0.9.2
  just_audio: ^0.10.5
  quick_actions: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.0
  json_serializable: ^6.11.1
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  mocktail: ^1.0.4
  checks: ^0.3.1
  collection: ^1.19.1
  drift_dev: ^2.34.0
  fake_async: ^1.3.3
  flutter_native_splash: ^2.4.6

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  generate: true
  # Localization
  # ARB files live in lib/l10n (configured via l10n.yaml)
  
  assets:
    - assets/icons/
    - assets/vad/

  fonts:
    - family: Geist Sans
      fonts:
        - asset: assets/fonts/geist/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/geist/Geist-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/geist/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/geist/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/geist/Geist-Bold.ttf
          weight: 700
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/geist/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/geist/GeistMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/geist/GeistMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/geist/GeistMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/geist/GeistMono-Bold.ttf
          weight: 700
